spring.application.name=GameStudio
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gamestudiodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

jwt.secret=${JWT_SECRET:super-secret-key-super-secret-key}
jwt.access_token.expiration_time=${JWT_ACCESS_TOKEN_EXPIRATION_TIME:600000}
jwt.refresh_token.expiration_time=${JWT_REFRESH_TOKEN_EXPIRATION_TIME:10080000}
